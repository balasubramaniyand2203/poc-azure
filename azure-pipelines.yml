trigger:
  branches:
    include:
      - feature/app-deployment

pool:
  name: 'bala-poc'

variables:
  buildConfiguration: 'Release'
  azureSubscription: 'aks-dev'
  aksclustername: "dev-bcc-aks"
  k8sNamespace: 'default'
  imagePullSecretName: 'acr-pull'
  acrLoginServer: 'bala123reg.azurecr.io'
  dockerRegistryServiceConnection: 'docker-dev' # Verified from your screenshot
  tag: '$(Build.BuildId)'
  # Fixes the 'Legacy Builder' warning and speeds up the build
  DOCKER_BUILDKIT: 1 

stages:
  - stage: Build
    displayName: 'Build and Push'
    jobs:
      - job: BuildJob
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '8.x'

          - task: Docker@2
            displayName: 'Build and Push API'
            inputs:
              containerRegistry: '$(dockerRegistryServiceConnection)'
              repository: 'server-api'
              command: 'buildAndPush'
              Dockerfile: 'src/server-api/Dockerfile'
              # Context set to the folder where the .csproj lives
              buildContext: '$(Build.SourcesDirectory)/src/server-api' 
              tags: |
                $(tag)

          - task: Docker@2
            displayName: 'Build and Push Client'
            inputs:
              containerRegistry: '$(dockerRegistryServiceConnection)'
              repository: 'client-app'
              command: 'buildAndPush'
              Dockerfile: 'src/client-app/Dockerfile'
              # Assuming client-app is also in src/
              buildContext: '$(Build.SourcesDirectory)/src/client-app' 
              tags: |
                $(tag)

           # Update the path to include the k8s folder
          - publish: $(System.DefaultWorkingDirectory)/k8s/deployment.yaml
            artifact: manifests

  - stage: Deploy
    displayName: 'Deploy to AKS'
    dependsOn: Build
    jobs:
      - job: DeployToAKS
        steps:
          - download: current
            artifact: manifests

          - task: KubernetesManifest@1
            displayName: 'Create ACR Secret'
            inputs:
              action: 'createSecret'
              kubernetesServiceConnection: '$(azureSubscription)'
              namespace: '$(k8sNamespace)'
              secretName: '$(imagePullSecretName)'
              dockerRegistryEndpoint: '$(dockerRegistryServiceConnection)'

          - task: KubernetesManifest@1
            displayName: 'Deploy to Cluster'
            inputs:
              action: 'deploy'
              # Using variable for consistency
              kubernetesServiceConnection: '$(azureSubscription)' 
              namespace: '$(k8sNamespace)'
              manifests: '$(Pipeline.Workspace)/manifests/deployment.yaml'
              imagePullSecrets: '$(imagePullSecretName)'
              containers: |
                $(acrLoginServer)/server-api:$(tag)
                $(acrLoginServer)/client-app:$(tag)
