# --- 1. BACKEND: .NET API ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
  labels:
    app: weather-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-api
  template:
    metadata:
      labels:
        app: weather-api
    spec:
      containers:
      - name: api
        image: bala123reg.azurecr.io/server-api:$(tag)
        ports:
        - containerPort: 8080
        env:
        # Senior Tip: Double underscores (__) replace colons (:) for .NET Environment variables
        - name: ConnectionStrings__DefaultConnection
          value: "Server=my-mysql-server.mysql.database.azure.com, Port=3306;Initial Catalog=techdb;Persist Security Info=False;User ID=mysqladmin;Password=Password123!;MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
---
apiVersion: v1
kind: Service
metadata:
  name: weather-api-svc
spec:
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: weather-api
  type: ClusterIP # Internal only

---
# --- 2. FRONTEND: REACT (VITE) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-ui
  labels:
    app: weather-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-ui
  template:
    metadata:
      labels:
        app: weather-ui
    spec:
      containers:
      - name: ui
        image: bala123reg.azurecr.io/client-app:$(tag)
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: weather-ui-svc
spec:
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: weather-ui
  type: LoadBalancer # This creates a Public IP in Azure
